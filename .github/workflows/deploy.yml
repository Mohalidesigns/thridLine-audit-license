name: Deploy to VPS (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy License Server (Docker) to VPS
    # Build (composer + vite) happens on the VPS via `up --build`; allow time.
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sync the repo source into /opt/thirdline-license on the VPS using
      # PASSWORD auth (sshpass + rsync). .env holds prod secrets and lives ONLY
      # on the server; node_modules/vendor are built inside the image.
      - name: Sync source to VPS (rsync over password)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync
          sshpass -p "$SSH_PASSWORD" rsync -rlptDzvc --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude=/.git/ --exclude=/.github/ --exclude=/node_modules/ \
            --exclude=/vendor/ --exclude=/.env --exclude=/.env.example \
            ./ "$SSH_USERNAME@$SSH_HOST:/opt/thirdline-license"

      # Rebuild + restart the stack, then run migrations inside the app container.
      - name: Build, restart, migrate (docker compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: "20m"
          script: |
            set -e
            cd /opt/thirdline-license

            # Production secrets must already exist on the server (kept out of git).
            if [ ! -f .env ]; then
              echo "ERROR: /opt/thirdline-license/.env is missing. Create it from"
              echo ".env.docker.example (APP_KEY, DB_* for the postgres service, LICENSE_*)"
              echo "before deploying." >&2
              exit 1
            fi

            # Rebuild images with the new source and restart in place.
            docker compose up -d --build --remove-orphans

            # Give php-fpm a moment, then run schema migrations + cache warmup
            # inside the app container (the entrypoint does keys+dirs, not migrate).
            sleep 5
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize
            docker compose exec -T app php artisan storage:link || true

            # Reclaim disk from superseded image layers.
            docker image prune -f
            docker compose ps
